name: CI, Build, Test, Lint, and Release
permissions:
  contents: read

on:
  push:
    tags:
      - "v*"

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      create_release: ${{ steps.release_check.outputs.create_release }}
    steps:
    - name: Check if release exists
      id: release_check
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        TAG: ${{ github.ref_name }}
      run: |
        if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
          echo "Release $TAG already exists. Skipping expensive jobs."
          echo "create_release=false" >> "$GITHUB_OUTPUT"
        else
          echo "create_release=true" >> "$GITHUB_OUTPUT"
        fi

  test:
    needs: precheck
    if: needs.precheck.outputs.create_release == 'true'
    uses: ./.github/workflows/test.yml

  lint:
    if: needs.precheck.outputs.create_release == 'true'
    uses: ./.github/workflows/lint.yml
    needs:
      - precheck
      - test

  build:
    if: needs.precheck.outputs.create_release == 'true'
    uses: ./.github/workflows/wheel.yml
    needs:
      - precheck
      - lint

  release:
    if: needs.precheck.outputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    needs:
      - precheck
      - build
    steps:
    - name: Download built wheel artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: wheel-package
        path: dist

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        TAG: ${{ github.ref_name }}
      run: |
        gh release create "$TAG" dist/* --repo "$REPO" --verify-tag --title "$TAG" --generate-notes

    - name: Generate attestation
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: "dist/*"
